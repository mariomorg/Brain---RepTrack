<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#7C3AED" />
            <stop offset="100%" style="stop-color:#5B21B6" />
        </linearGradient>
    </defs>
    <rect width="512" height="512" rx="96" fill="url(#bg)" />
    <!-- Brain icon -->
    <g transform="translate(256,240)" fill="none" stroke="#fff" stroke-width="16"
        stroke-linecap="round" stroke-linejoin="round">
        <!-- Left hemisphere -->
        <path
            d="M-10,-100 C-70,-100 -120,-60 -120,0 C-120,40 -90,70 -60,80 C-80,100 -50,120 -10,120" />
        <path d="M-10,-100 C-50,-100 -100,-70 -100,-20" />
        <path d="M-120,0 C-100,0 -80,20 -60,20" />
        <!-- Right hemisphere -->
        <path d="M10,-100 C70,-100 120,-60 120,0 C120,40 90,70 60,80 C80,100 50,120 10,120" />
        <path d="M10,-100 C50,-100 100,-70 100,-20" />
        <path d="M120,0 C100,0 80,20 60,20" />
        <!-- Center connection -->
        <line x1="0" y1="-100" x2="0" y2="120" />
    </g>
    <!-- Repeat arrow at bottom -->
    <g transform="translate(256,400)" fill="none" stroke="#C4B5FD" stroke-width="12"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M-40,0 A40,40 0 1,1 40,0" />
        <polyline points="30,-12 40,0 28,10" />
    </g>
</svg>